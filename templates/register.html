<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxOffice - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <!-- Flash Messages Stack -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- Registration Card Box -->
                <div class="card shadow-sm border-0 mt-3">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center fw-bold mb-4" style="color: #0f2d59;">Create Account</h2>
                        
                        <form action="/register" method="POST">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Username</label>
                                <input type="text" class="form-items form-control" id="username" name="username" placeholder="Choose a username" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <input type="email" class="form-items form-control" id="email" name="email" placeholder="name@example.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="password" class="form-items form-control" id="password" name="password" placeholder="Create a strong password" required>
                            </div>

                            <div class="mb-4">
                                <label for="role" class="form-label fw-semibold">Account Type (Role Tiers)</label>
                                <select class="form-select" id="role" name="role">
                                    <option value="User" selected>Standard User</option>
                                    <option value="Admin">Admin</option>
                                    <option value="Tech Admin">Tech Admin</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn w-100 text-white fw-bold py-2 mb-3" style="background-color: #0f2d59;">Register</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <span class="text-muted">Already have an account?</span> 
                            <a href="/login" class="text-decoration-none fw-semibold" style="color: #2b6cb0;">Login here</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
