<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BoxOffice - Book Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h2 class="fw-bold mb-1" style="color: #0f2d59;">Confirm Booking</h2>
                        <p class="text-muted mb-4">Review show info and enter seat allocations.</p>

                        <div class="bg-light p-3 rounded mb-4">
                            <h4 class="fw-bold mb-2">{{ show.title }}</h4>
                            <p class="mb-1"><strong>📍 Venue:</strong> {{ show.theater_name }}</p>
                            <p class="mb-1"><strong>📅 Time:</strong> {{ show.show_time }}</p>
                            <p class="mb-1"><strong>🎟️ Price:</strong> ₹{{ show.ticket_price }} / seat</p>
                            <p class="mb-0 text-danger"><strong>🔥 Remaining Seats:</strong> {{ available_seats }}</p>
                        </div>

                        <form action="/book/{{ show.schedule_id }}" method="POST">
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Number of Seats</label>
                                <input type="number" name="seats_booked" class="form-control form-control-lg" min="1" max="{{ available_seats }}" required>
                            </div>
                            <button type="submit" class="btn btn-lg w-100 text-white fw-bold" style="background-color: #0f2d59;" {% if available_seats <= 0 %}disabled{% endif %}>
                                {% if available_seats > 0 %}Confirm and Pay{% else %}Sold Out{% endif %}
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
